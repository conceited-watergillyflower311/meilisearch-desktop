name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - name: macOS Intel
            os: macos-15
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating version to $VERSION"
          
          # Update package.json
          npm version $VERSION --no-git-tag-version --allow-same-version
          
          # Update tauri.conf.json
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          else
            sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json 2>/dev/null || \
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          fi
          
          # Update Cargo.toml (first version line only)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            sed -i "0,/^version = /s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          else
            sed -i '' "1,/^version = /s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml 2>/dev/null || \
            sed -i "0,/^version = /s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          fi
          
          echo "Version updated to $VERSION"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meilisearch Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## Meilisearch Desktop ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.msi` or `.exe` installer
            - **macOS**: `.dmg` (Intel or Apple Silicon)
            - **Linux**: `.deb` or `.AppImage`

            ### Changes
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
          args: ${{ matrix.platform.args }}
          updaterJsonKeepUniversal: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform.target }}
          path: |
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: ignore
          retention-days: 7

  updater:
    name: Generate Updater JSON
    needs: build
    runs-on: ubuntu-latest
    if: always() && contains(needs.build.result, 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Wait for release assets
        run: sleep 30

      - name: Generate updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="$GITHUB_REPOSITORY"
          TAG="$GITHUB_REF_NAME"
          
          # Get release info and download signature files
          echo "Fetching release info for ${TAG}..."
          
          # Function to get signature from release assets
          get_signature() {
            local asset_name="$1"
            local sig_url="https://github.com/${REPO}/releases/download/${TAG}/${asset_name}.sig"
            curl -sL "$sig_url" 2>/dev/null || echo ""
          }
          
          # Get signatures (will be empty if not signed)
          WIN_SIG=$(get_signature "Meilisearch-Desktop_${VERSION}_x64-setup.nsis.zip")
          MAC_INTEL_SIG=$(get_signature "Meilisearch-Desktop_x64.app.tar.gz")
          MAC_ARM_SIG=$(get_signature "Meilisearch-Desktop_aarch64.app.tar.gz")
          LINUX_SIG=$(get_signature "meilisearch-desktop_${VERSION}_amd64.AppImage.tar.gz")
          
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Meilisearch Desktop ${TAG}",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Meilisearch-Desktop_${VERSION}_x64-setup.nsis.zip",
                "signature": "${WIN_SIG}"
              },
              "darwin-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Meilisearch-Desktop_x64.app.tar.gz",
                "signature": "${MAC_INTEL_SIG}"
              },
              "darwin-aarch64": {
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Meilisearch-Desktop_aarch64.app.tar.gz",
                "signature": "${MAC_ARM_SIG}"
              },
              "linux-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${TAG}/meilisearch-desktop_${VERSION}_amd64.AppImage.tar.gz",
                "signature": "${LINUX_SIG}"
              }
            }
          }
          EOF
          
          echo "Generated latest.json:"
          cat latest.json

      - name: Upload updater manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-notes:
    name: Update Release Notes
    needs: updater
    runs-on: ubuntu-latest
    if: always() && contains(needs.build.result, 'success')
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          publish: true
          version: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
